name: pgsql_serializable
version: 6.14.1
description: >-
  Automatically generate code for converting to and from PgSQL by annotating
  Dart classes.
publish_to: https://pub.anycode.dev
repository: https://github.com/anycode/pgsql_serializable.dart/tree/master/pgsql_serializable
environment:
  sdk: ^3.9.0
topics:
 - pgsql
 - build-runner
 - pgsql-serializable
 - codegen

resolution: workspace

dependencies:
  analyzer: '>=10.0.0 <14.0.0'
  async: ^2.10.0
  build: ^4.0.4
  build_config: ^1.2.0
  dart_style: ^3.1.4

  # Use a tight version constraint to ensure that a constraint on
  # `pgsql_annotation` properly constrains all features it provides.
  pgsql_annotation:
    version: '>=4.12.0 <4.13.0'
    hosted: https://pub.anycode.dev
  meta: ^1.16.0
  path: ^1.9.0
  pub_semver: ^2.1.4
  pubspec_parse: ^1.0.0
  source_gen: ^4.1.2
  source_helper: ^1.3.10

dev_dependencies:
  _pgsql_serial_shared_test:
    path: ../shared_test
  build_runner: ^2.10.5
  build_verify: ^3.0.0
  collection: ^1.19.0
  #pgsql_schema: ^5.2.2
  logging: ^1.2.0
  source_gen_test: ^1.3.4
  test: ^1.29.0
  test_descriptor: ^2.0.0
  test_process: ^2.0.0
  yaml: ^3.1.3
