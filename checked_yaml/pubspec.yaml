name: checked_yaml
version: 2.0.5-wip

description: >-
  Generate more helpful exceptions when decoding YAML documents using
  package:pgsql_serializable and package:yaml.
repository: https://github.com/anycode/pgsql_serializable.dart/tree/master/checked_yaml
topics:
 - yaml
 - pgsql
 - build-runner
 - pgsql-serializable
 - codegen

environment:
  sdk: ^3.9.0

resolution: workspace

dependencies:
  pgsql_annotation: ^4.3.0
  source_span: ^1.10.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.10.5
  build_verify: ^3.0.0
  pgsql_serializable: ^6.0.0
  path: ^1.9.0
  test: ^1.29.0
  test_process: ^2.0.0
